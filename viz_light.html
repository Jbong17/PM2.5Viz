}

  function r(s){var x=Math.sin(s)*43758.5453;return x-Math.floor(x);}
  return[22,20,16,14,12,10,9,10,12,16,24,25].map(function(v,i){
    return Math.max(2,v*(base/16)+(r(seed+i)*6-3));
  });
}

LUZON",15.38,120.48],["NCR",14.62,121.06],

CITIES.forEach(function(city){

["ALL","DJF","MAM","JJA","SON"].forEach(function(s){

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getEdges(){
  var ms=MS[MONTH];
  return EDGES.filter(function(e){
    return SEASON==="ALL"||e[3]===SEASON||e[3]===ms;
  }).map(function(e){return{src:e[0],tgt:e[1],lag:e[2],season:e[3],w:e[4]};});
}
function bezPath(s,t){
  var a=CPOS[s],b=CPOS[t];if(!a||!b)return"";
  var mx=(a.x+b.x)/2-(b.y-a.y)*0.15,my=(a.y+b.y)/2+(b.x-a.x)*0.15;
  return"M"+a.x+","+a.y+" Q"+mx+","+my+" "+b.x+","+b.y;
}
function bezPt(a,b,t){
  var mx=(a.x+b.x)/2-(b.y-a.y)*0.15,my=(a.y+b.y)/2+(b.x-a.x)*0.15;
  var q=1-t;
  return{x:q*q*a.x+2*q*t*mx+t*t*b.x, y:q*q*a.y+2*q*t*my+t*t*b.y};
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function initPts(edges){
  while(ptG.firstChild)ptG.removeChild(ptG.firstChild);
  particles=[];
  edges.slice(0,55).forEach(function(e){
    var a=CPOS[e.src],b=CPOS[e.tgt];if(!a||!b)return;
    var n=Math.ceil(e.w*3);
    for(var i=0;i<n;i++){
      var t=Math.random(),sp=0.003+Math.random()*0.002;
      var pos=bezPt(a,b,t);
      var c=el("circle",{cx:pos.x,cy:pos.y,r:"2.2",
        fill:SC[e.season],opacity:"0.88",filter:"url(#glow)"},ptG);
      particles.push({e:e,t:t,sp:sp,el:c});
    }
  });
}

// ── ANIMATION ─────────────────────────────────────────────────────────────────
function anim(){
  if(!PLAYING){animId=null;return;}
  tickN++;
  if(tickN%2===0){
    particles.forEach(function(p){
      p.t+=p.sp; if(p.t>1)p.t-=1;
      var a=CPOS[p.e.src],b=CPOS[p.e.tgt];
      if(!a||!b||!p.el)return;
      var pos=bezPt(a,b,p.t);
      p.el.setAttribute("cx",pos.x);
      p.el.setAttribute("cy",pos.y);
    });
  }
  animId=requestAnimationFrame(anim);
}
function startAnim(){
  if(animId)cancelAnimationFrame(animId);
  if(monthId)clearInterval(monthId);
  if(PLAYING){
    animId=requestAnimationFrame(anim);
    monthId=setInterval(function(){MONTH=MONTH>=12?1:MONTH+1;render();},1800);
  }
}

// ── RIGHT PANEL ───────────────────────────────────────────────────────────────
function renderPanel(edges){
  var panel=document.getElementById("panel");
  var city=SEL?CITIES.find(function(c){return c.id===SEL;}):null;
  var ms=MS[MONTH];

  if(!city){
    panel.innerHTML=
      '<div style="padding-top:28px;line-height:2.1;">'
      +'<div style="font-size:12px;color:#2563eb;margin-bottom:14px;letter-spacing:0.04em;font-weight:600;">&#9670; Click any city to explore</div>'
      +["Animated particles show directed PM&#8322;.&#8325; transport",
        "Arrowheads mark the causal direction",
        "Edge colour = dominant PAGASA season",
        "Dash pattern = transport lag (1&ndash;3 days)",
        "Season buttons filter active corridors",
        "Month bar cycles through seasonal activation",
        "Click any connection row to jump to that city"
      ].map(function(t){return'<div style="font-size:9px;color:#475569;margin-bottom:1px;">&rarr; '+t+'</div>';}).join("")
      +'<div style="margin-top:18px;padding:8px 10px;background:#f8fafc;border:1px solid #e2e8f0;'
      +'border-radius:3px;font-size:8px;color:#94a3b8;line-height:1.8;">'
      +'Proxy-controlled Granger causality &middot; BH-FDR q&#8202;=&#8202;0.05<br>'
      +'344-edge backbone &middot; Top-20% by Granger weight<br>'
      +'7 functional airsheds &middot; CCM validated (n&#8202;=&#8202;30 pairs)</div></div>'
      +statsBar(edges);
    return;
  }

  var col=AC[city.aid];
  var pm=PM25[city.id];
  var out=edges.filter(function(e){return e.src===SEL;});
  var inc=edges.filter(function(e){return e.tgt===SEL;});
  var o=out.length,ic=inc.length;
  var role=o>ic*1.5?["EMITTER","#E64B35"]:ic>o*1.5?["RECEPTOR","#4A9EFF"]:["HUB","#34D399"];

  // PM chart
  var bars=pm.map(function(v,i){
    var bw=14,bx=16+(i/12)*220+1,bh=(v/30)*58,by=65-bh,act=(i+1)===MONTH,s=MS[i+1];
    return'<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh
      +'" fill="'+SC[s]+'" opacity="'+(act?1:0.28)+'" rx="1"/>'
      +(act?'<rect x="'+bx+'" y="'+(by-2)+'" width="'+bw+'" height="2" fill="#fff" opacity="0.9"/>':'');
  }).join("");
  var grid=[5,10,15,20,25].map(function(v){
    var y=65-(v/30)*58;
    return'<line x1="14" x2="236" y1="'+y+'" y2="'+y+'" stroke="#e2e8f0" stroke-width="0.5"/>'
      +'<text x="12" y="'+(y+3)+'" font-size="6" fill="#94a3b8" text-anchor="end">'+v+'</text>';
  }).join("");
  var mlbls=MN.slice(1).map(function(m,i){
    var act=(i+1)===MONTH;
    return'<text x="'+(16+(i/12)*220+9)+'" y="74" font-size="6" fill="'+(act?"#CBD5E1":"#1E3050")
      +'" text-anchor="middle">'+m+'</text>';
  }).join("");

  function eRow(e,dir){
    var tid=dir==="out"?e.tgt:e.src;
    var tc=CITIES.find(function(c){return c.id===tid;});
    var tcol=tc?AC[tc.aid]:"#888";
    var bc=SC[e.season]+(dir==="inc"?"44":"");
    return'<div class="erow" onclick="jumpTo(\''+tid+'\')" '
      +'style="border-left:2px solid '+bc+';">'
      +'<div style="width:5px;height:5px;border-radius:50%;background:'+tcol+';flex-shrink:0;"></div>'
      +'<span style="font-size:8px;color:'+(dir==="out"?"#7A9AB8":"#3A5570")+';flex:1;">'
      +(dir==="out"?"&rarr; "+e.tgt:e.src+" &rarr;")+'</span>'
      +'<span style="font-size:7px;color:#64748b;">L'+e.lag+'</span>'
      +'<span style="font-size:7px;color:'+SC[e.season]+';">'+e.season+'</span>'
      +'<div style="width:26px;height:2px;background:#1A2744;border-radius:1px;">'
      +'<div style="width:'+(e.w*100)+'%;height:100%;background:'+SC[e.season]+(dir==="inc"?"88":"")+';border-radius:1px;"></div>'
      +'</div></div>';
  }

  panel.innerHTML=
    '<div style="border-bottom:1px solid #f1f5f9;padding-bottom:10px;">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">'
        +'<div style="width:9px;height:9px;border-radius:50%;background:'+col+';"></div>'
        +'<span style="font-size:14px;font-weight:bold;color:#0f172a;">'+city.id+'</span>'
        +'<button onclick="jumpTo(null)" style="margin-left:auto;background:transparent;'
        +'border:1px solid #1A2744;color:#64748b;border-radius:2px;padding:1px 6px;'
        +'font-size:8px;font-family:\'Courier New\',monospace;">&#10005; close</button>'
      +'</div>'
      +'<div style="font-size:8px;color:#64748b;">'+AL[city.aid]+'</div>'
      +'<div style="font-size:8px;color:#94a3b8;margin-top:2px;">'+city.lat.toFixed(3)+'&deg;N &middot; '+city.lon.toFixed(3)+'&deg;E</div>'
    +'</div>'

    +'<div>'
      +'<div style="font-size:8px;color:#475569;letter-spacing:0.1em;margin-bottom:6px;">MONTHLY PM&#8322;.&#8325; PROFILE (&#956;g m&#8315;&#179;)</div>'
      +'<svg width="100%" viewBox="0 0 240 78" style="overflow:visible;font-family:\'Courier New\',monospace;">'
        +[[1,3,"DJF"],[3,6,"MAM"],[6,9,"JJA"],[9,12,"SON"]].map(function(x){
          return'<rect x="'+(16+(x[0]-1)/12*220)+'" width="'+((x[1]-x[0])/12*220)+'" y="0" height="65" fill="'+SC[x[2]]+'" opacity="0.05"/>';
        }).join("")
        +grid+bars+mlbls
        +'<text x="240" y="13" text-anchor="end" font-size="18" font-weight="bold" fill="'+SC[ms]+'" opacity="0.9">'+pm[MONTH-1].toFixed(1)+'</text>'
        +'<text x="240" y="24" text-anchor="end" font-size="7" fill="#94a3b8">&#956;g m&#8315;&#179; &middot; '+MN[MONTH]+'</text>'
      +'</svg>'
    +'</div>'

    +'<div style="display:flex;align-items:center;gap:10px;padding:7px 9px;'
      +'background:#080E1A;border:1px solid '+role[1]+'22;border-radius:3px;">'
      +'<span style="font-size:11px;font-weight:bold;color:'+role[1]+';">'+role[0]+'</span>'
      +'<span style="font-size:8px;color:#475569;">'+o+' outgoing &middot; '+ic+' incoming</span>'
    +'</div>'

    +(out.length?'<div><div style="font-size:8px;color:#4A9EFF;letter-spacing:0.08em;margin-bottom:5px;">&#9654; OUTGOING ('+out.length+')</div>'
      +out.slice(0,8).map(function(e){return eRow(e,"out");}).join("")+'</div>':"")

    +(inc.length?'<div><div style="font-size:8px;color:#C084FC;letter-spacing:0.08em;margin-bottom:5px;">&#9664; INCOMING ('+inc.length+')</div>'
      +inc.slice(0,8).map(function(e){return eRow(e,"inc");}).join("")+'</div>':"")

    +statsBar(edges);
}

function statsBar(edges){
  return'<div style="margin-top:auto;border-top:1px solid #f1f5f9;padding-top:9px;display:flex;gap:14px;flex-wrap:wrap;">'
    +[["CITIES","40"],["EDGES","344"],["AIRSHEDS","7"],["SEASON",MS[MONTH]],["ACTIVE",edges.length]].map(function(x){
      return'<div><div style="font-size:7px;color:#94a3b8;letter-spacing:0.1em;">'+x[0]+'</div>'
        +'<div style="font-size:11px;color:#1e40af;font-weight:700;">'+x[1]+'</div></div>';
    }).join("")+'</div>';
}

// ── JUMP TO CITY (from panel row clicks) ──────────────────────────────────────
window.jumpTo=function(id){SEL=id;render();};

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  var edges=getEdges();
  var ms=MS[MONTH];

  // Season buttons
  document.querySelectorAll(".sbtn").forEach(function(b){
    var s=b.dataset.s,active=SEASON===s,col=SC[s]||"#4A9EFF";
    b.style.background=active?col:"transparent";
    b.style.color=active?"#fff":"#3A5070";
    b.style.border="1px solid "+(active?col:"#1A2744");
  });
  playB.textContent=PLAYING?"&#9646;&#9646; PAUSE":"&#9654; PLAY";

  // Month buttons
  document.querySelectorAll(".mbtn").forEach(function(b){
    var mo=+b.dataset.mo,act=mo===MONTH,s=MS[mo];
    b.style.background=act?SC[s]:"#0A1020";
    b.style.color=act?"#fff":"#2A4060";
    b.style.fontWeight=act?"bold":"normal";
  });
  var ml=document.getElementById("mlabel");
  ml.textContent=MN[MONTH]+" \u00b7 "+ms;
  ml.style.color=SC[ms];
  document.getElementById("ecount").textContent=edges.length+" edges active";

  // Draw edges
  while(edgeG.firstChild)edgeG.removeChild(edgeG.firstChild);
  edges.forEach(function(e){
    var hi=SEL&&(e.src===SEL||e.tgt===SEL),dim=SEL&&!hi;
    el("path",{d:bezPath(e.src,e.tgt),fill:"none",stroke:SC[e.season],
      "stroke-width":hi?"2.5":"0.75",
      "stroke-opacity":dim?"0.03":hi?"1":"0.22",
      "stroke-dasharray":e.lag===1?"none":e.lag===2?"6,3":"2,3",
      "marker-end":"url(#mk"+e.season+")"},edgeG);
  });

  // Update nodes
  CITIES.forEach(function(city){
    var n=NEL[city.id],isSel=city.id===SEL;
    var dim=SEL&&!isSel&&!edges.some(function(e){
      return(e.src===SEL&&e.tgt===city.id)||(e.tgt===SEL&&e.src===city.id);
    });
    sa(n.dot,{r:isSel?"8":"4.5",opacity:dim?"0.15":"1",
      filter:isSel?"url(#glow)":"none",
      stroke:isSel?"#fff":"none","stroke-width":"1.5"});
    sa(n.halo,{opacity:isSel?"0.18":"0"});
    sa(n.lbl,{opacity:isSel?"1":"0"});
  });

  // Restart particles for new edge set
  initPts(edges);

  // Panel
  renderPanel(edges);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
startAnim();
</script>
