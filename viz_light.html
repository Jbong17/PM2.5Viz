// ── HELPERS ───────────────────────────────────────────────────────────────────
function getEdges(){
  var ms=MS[MONTH];
  return EDGES.filter(function(e){
    return SEASON==="ALL"||e[3]===SEASON||e[3]===ms;
  }).map(function(e){return{src:e[0],tgt:e[1],lag:e[2],season:e[3],w:e[4]};});
}
function bezPath(s,t){
  var a=CPOS[s],b=CPOS[t];if(!a||!b)return"";
  var mx=(a.x+b.x)/2-(b.y-a.y)*0.15,my=(a.y+b.y)/2+(b.x-a.x)*0.15;
  return"M"+a.x+","+a.y+" Q"+mx+","+my+" "+b.x+","+b.y;
}
function bezPt(a,b,t){
  var mx=(a.x+b.x)/2-(b.y-a.y)*0.15,my=(a.y+b.y)/2+(b.x-a.x)*0.15;
  var q=1-t;
  return{x:q*q*a.x+2*q*t*mx+t*t*b.x, y:q*q*a.y+2*q*t*my+t*t*b.y};
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function initPts(edges){
  while(ptG.firstChild)ptG.removeChild(ptG.firstChild);
  particles=[];
  edges.slice(0,55).forEach(function(e){
    var a=CPOS[e.src],b=CPOS[e.tgt];if(!a||!b)return;
    var n=Math.ceil(e.w*3);
    for(var i=0;i<n;i++){
      var t=Math.random(),sp=0.003+Math.random()*0.002;
      var pos=bezPt(a,b,t);
      var c=el("circle",{cx:pos.x,cy:pos.y,r:"2.2",
        fill:SC[e.season],opacity:"0.88",filter:"url(#glow)"},ptG);
      particles.push({e:e,t:t,sp:sp,el:c});
    }
  });
}

// ── ANIMATION ─────────────────────────────────────────────────────────────────
function anim(){
  if(!PLAYING){animId=null;return;}
  tickN++;
  if(tickN%2===0){
    particles.forEach(function(p){
      p.t+=p.sp; if(p.t>1)p.t-=1;
      var a=CPOS[p.e.src],b=CPOS[p.e.tgt];
      if(!a||!b||!p.el)return;
      var pos=bezPt(a,b,p.t);
      p.el.setAttribute("cx",pos.x);
      p.el.setAttribute("cy",pos.y);
    });
  }
  animId=requestAnimationFrame(anim);
}
function startAnim(){
  if(animId)cancelAnimationFrame(animId);
  if(monthId)clearInterval(monthId);
  if(PLAYING){
    animId=requestAnimationFrame(anim);
    monthId=setInterval(function(){MONTH=MONTH>=12?1:MONTH+1;render();},1800);
  }
}

      +'7 functional airsheds &middot; CCM validated (n&#8202;=&#8202;30 pairs)</div></div>'

    return;

  var bars=pm.map(function(v,i){

    return'<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh
      +'" fill="'+SC[s]+'" opacity="'+(act?1:0.28)+'" rx="1"/>'

  }).join("");
  var grid=[5,10,15,20,25].map(function(v){
    var y=65-(v/30)*58;

      +'style="border-left:2px solid '+bc+';">'
      +'<div style="width:5px;height:5px;border-radius:50%;background:'+tcol+';flex-shrink:0;"></div>'
      +'<span style="font-size:8px;color:'+(dir==="out"?"#7A9AB8":"#3A5570")+';flex:1;">'
      +(dir==="out"?"&rarr; "+e.tgt:e.src+" &rarr;")+'</span>'
      +'<span style="font-size:7px;color:#374869;">L'+e.lag+'</span>'
      +'<span style="font-size:7px;color:'+SC[e.season]+';">'+e.season+'</span>'
      +'<div style="width:26px;height:2px;background:#1A2744;border-radius:1px;">'
      +'<div style="width:'+(e.w*100)+'%;height:100%;background:'+SC[e.season]+(dir==="inc"?"88":"")+';border-radius:1px;"></div>'
      +'</div></div>';
  }

  panel.innerHTML=
    '<div style="border-bottom:1px solid #0F1A2E;padding-bottom:10px;">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">'
        +'<div style="width:9px;height:9px;border-radius:50%;background:'+col+';"></div>'
        +'<span style="font-size:14px;font-weight:bold;color:#E2E8F0;">'+city.id+'</span>'
        +'<button onclick="jumpTo(null)" style="margin-left:auto;background:transparent;'
        +'border:1px solid #1A2744;color:#374869;border-radius:2px;padding:1px 6px;'

    +'<div>'
      +'<div style="font-size:8px;color:#2A4060;letter-spacing:0.1em;margin-bottom:6px;">MONTHLY PM&#8322;.&#8325; PROFILE (&#956;g m&#8315;&#179;)</div>'
      +'<svg width="100%" viewBox="0 0 240 78" style="overflow:visible;font-family:\'Courier New\',monospace;">'
        +[[1,3,"DJF"],[3,6,"MAM"],[6,9,"JJA"],[9,12,"SON"]].map(function(x){

        +'<text x="240" y="24" text-anchor="end" font-size="7" fill="#374869">&#956;g m&#8315;&#179; &middot; '+MN[MONTH]+'</text>'
      +'</svg>'

    +'<div style="display:flex;align-items:center;gap:10px;padding:7px 9px;'

function statsBar(edges){

    +[["CITIES","40"],["EDGES","344"],["AIRSHEDS","7"],["SEASON",MS[MONTH]],["ACTIVE",edges.length]].map(function(x){

// ── JUMP TO CITY (from panel row clicks) ──────────────────────────────────────

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  var edges=getEdges();
  var ms=MS[MONTH];

  // Season buttons
  document.querySelectorAll(".sbtn").forEach(function(b){
    var s=b.dataset.s,active=SEASON===s,col=SC[s]||"#4A9EFF";
    b.style.background=active?col:"transparent";
    b.style.color=active?"#fff":"#3A5070";
    b.style.border="1px solid "+(active?col:"#1A2744");
  });
  playB.textContent=PLAYING?"&#9646;&#9646; PAUSE":"&#9654; PLAY";

  // Month buttons
  document.querySelectorAll(".mbtn").forEach(function(b){
    var mo=+b.dataset.mo,act=mo===MONTH,s=MS[mo];
    b.style.background=act?SC[s]:"#0A1020";
    b.style.color=act?"#fff":"#2A4060";
    b.style.fontWeight=act?"bold":"normal";
  });
  var ml=document.getElementById("mlabel");
  ml.textContent=MN[MONTH]+" \u00b7 "+ms;
  ml.style.color=SC[ms];
  document.getElementById("ecount").textContent=edges.length+" edges active";

  // Draw edges
  while(edgeG.firstChild)edgeG.removeChild(edgeG.firstChild);
  edges.forEach(function(e){
    var hi=SEL&&(e.src===SEL||e.tgt===SEL),dim=SEL&&!hi;
    el("path",{d:bezPath(e.src,e.tgt),fill:"none",stroke:SC[e.season],
      "stroke-width":hi?"2.5":"0.75",
      "stroke-opacity":dim?"0.03":hi?"1":"0.22",
      "stroke-dasharray":e.lag===1?"none":e.lag===2?"6,3":"2,3",
      "marker-end":"url(#mk"+e.season+")"},edgeG);
  });

  // Update nodes
  CITIES.forEach(function(city){
    var n=NEL[city.id],isSel=city.id===SEL;
    var dim=SEL&&!isSel&&!edges.some(function(e){
      return(e.src===SEL&&e.tgt===city.id)||(e.tgt===SEL&&e.src===city.id);
    });
    sa(n.dot,{r:isSel?"8":"4.5",opacity:dim?"0.15":"1",
      filter:isSel?"url(#glow)":"none",
      stroke:isSel?"#fff":"none","stroke-width":"1.5"});
    sa(n.halo,{opacity:isSel?"0.18":"0"});
    sa(n.lbl,{opacity:isSel?"1":"0"});
  });

  // Restart particles for new edge set
  initPts(edges);

  // Panel
  renderPanel(edges);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
startAnim();
